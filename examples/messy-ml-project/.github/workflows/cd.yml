name: "CD: Deploy"

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    runs-on: ubuntu-latest
    concurrency: messy-ml-project-staging-deploy
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate -t staging
        env:
          DATABRICKS_TOKEN: ${{ secrets.STAGING_WORKSPACE_TOKEN }}

      - name: Deploy to staging
        run: databricks bundle deploy -t staging
        env:
          DATABRICKS_TOKEN: ${{ secrets.STAGING_WORKSPACE_TOKEN }}

  deploy-prod:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'prod')
    runs-on: ubuntu-latest
    concurrency: messy-ml-project-prod-deploy
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate -t prod
        env:
          DATABRICKS_TOKEN: ${{ secrets.PROD_WORKSPACE_TOKEN }}

      - name: Deploy to prod
        run: databricks bundle deploy -t prod
        env:
          DATABRICKS_TOKEN: ${{ secrets.PROD_WORKSPACE_TOKEN }}
