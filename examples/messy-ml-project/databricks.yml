bundle:
  name: messy-ml-project

variables:
  experiment_name:
    description: MLflow experiment path for model training.
    default: /Users/${workspace.current_user.userName}/${bundle.target}-messy-ml-project-experiment

  model_name:
    description: Registered model name in Unity Catalog.
    default: messy-ml-project

  catalog_name:
    description: Unity Catalog catalog name (maps to environment).

include:
  - ./resources/training-job.yml
  - ./resources/inference-job.yml

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog_name: dev
    workspace:
      host: https://az-commercial-us-lakehouse-dev.cloud.databricks.com

  staging:
    variables:
      catalog_name: staging
    workspace:
      host: https://az-commercial-us-lakehouse-dev.cloud.databricks.com

  prod:
    variables:
      catalog_name: prod
    workspace:
      host: https://az-commercial-us-lakehouse-dev.cloud.databricks.com
