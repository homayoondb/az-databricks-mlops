new_cluster: &new_cluster
  new_cluster:
    num_workers: 3
    spark_version: 15.3.x-cpu-ml-scala2.12
    node_type_id: m5.xlarge
    data_security_mode: SINGLE_USER

resources:
  jobs:
    model_training_job:
      name: ${bundle.target}-messy-ml-project-model-training-job
      job_clusters:
        - job_cluster_key: training_cluster
          <<: *new_cluster

      tasks:
        - task_key: Train
          job_cluster_key: training_cluster
          notebook_task:
            notebook_path: ../notebooks/train_model_v3_FINAL.py
            base_parameters:
              env: ${bundle.target}
              experiment_name: ${var.experiment_name}
              model_name: ${var.catalog_name}.messy-ml-project.${var.model_name}

        - task_key: ModelValidation
          job_cluster_key: training_cluster
          depends_on:
            - task_key: Train
          notebook_task:
            notebook_path: ../mlops/run_validation.py
            base_parameters:
              env: ${bundle.target}
              experiment_name: ${var.experiment_name}
              model_name: ${var.catalog_name}.messy-ml-project.${var.model_name}
              run_mode: dry_run
              model_type: regressor

        - task_key: ModelDeployment
          job_cluster_key: training_cluster
          depends_on:
            - task_key: ModelValidation
          notebook_task:
            notebook_path: ../mlops/run_deploy.py
            base_parameters:
              env: ${bundle.target}
              model_name: ${var.catalog_name}.messy-ml-project.${var.model_name}

      schedule:
        quartz_cron_expression: "0 0 9 * * ?"
        timezone_id: UTC

      permissions:
        - level: CAN_VIEW
          group_name: users
