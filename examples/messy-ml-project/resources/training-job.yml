resources:
  jobs:
    model_training_job:
      name: ${bundle.target}-messy-ml-project-model-training-job

      environments:
        - environment_key: mlops_env
          spec:
            client: "1"
            dependencies:
              - mlflow
              - databricks-sdk>=0.20

      tasks:
        - task_key: Train
          environment_key: mlops_env
          notebook_task:
            notebook_path: ../mlops/run_training.py
            base_parameters:
              env: ${bundle.target}
              experiment_name: ${var.experiment_name}
              model_name: ${var.catalog_name}.${var.schema_name}.${var.model_name}
              dataset_table: ""  # optional: UC table used for training (e.g. catalog.schema.features)

        - task_key: ModelValidation
          environment_key: mlops_env
          depends_on:
            - task_key: Train
          notebook_task:
            notebook_path: ../mlops/run_validation.py
            base_parameters:
              env: ${bundle.target}
              experiment_name: ${var.experiment_name}
              model_name: ${var.catalog_name}.${var.schema_name}.${var.model_name}
              run_mode: dry_run
              model_type: regressor

        - task_key: ModelDeployment
          environment_key: mlops_env
          depends_on:
            - task_key: ModelValidation
          notebook_task:
            notebook_path: ../mlops/run_deploy.py
            base_parameters:
              env: ${bundle.target}
              model_name: ${var.catalog_name}.${var.schema_name}.${var.model_name}

      schedule:
        quartz_cron_expression: "0 0 9 * * ?"
        timezone_id: UTC

      permissions:
        - level: CAN_VIEW
          group_name: users
