resources:
  jobs:
    batch_inference_job:
      name: ${bundle.target}-messy-ml-project-batch-inference-job

      tasks:
        - task_key: batch_inference
          new_cluster:
            num_workers: 3
            spark_version: 15.3.x-cpu-ml-scala2.12
            node_type_id: m5.xlarge
            data_security_mode: SINGLE_USER
          notebook_task:
            notebook_path: ../deployment/batch_inference/notebooks/BatchInference.py
            base_parameters:
              env: ${bundle.target}
              input_table_name: ${var.catalog_name}.messy-ml-project.inference_input
              output_table_name: ${var.catalog_name}.messy-ml-project.predictions
              model_name: ${var.catalog_name}.messy-ml-project.${var.model_name}

      schedule:
        quartz_cron_expression: "0 0 11 * * ?"
        timezone_id: UTC

      permissions:
        - level: CAN_VIEW
          group_name: users
